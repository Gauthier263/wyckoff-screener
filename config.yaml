# Configuration du Wyckoff screener — tout est ajustable.
exchange: binance        # tout exchange supporté par ccxt
# Miroir de données publiques Binance (klines/tickers) quand api.binance.com est
# géo-bloqué. Mettre "" pour taper l'API Binance directement. Sans effet hors Binance.
mirror: data-api.binance.vision
quote: USDT
timeframe: 1h            # 1h ou 4h (tes choix). Override : --timeframe 4h
top: 60                  # nombre de paires les plus liquides à scanner
limit: 300              # barres OHLCV récupérées par paire
max_results: 25         # taille de la watchlist finale
bias: both              # both | accumulation | distribution
use_cache: true

# --- Multi-timeframe (option --mtf) : [HTF contexte, LTF déclencheur] ---
timeframes: [4h, 1h]

# --- Backtest (python -m screener.backtest) ---
backtest:
  stop_atr: 1.0          # distance du stop en ATR
  rr: 2.0                # objectif en multiples de risque
  max_hold: 30           # barres max en position
  limit: 1000            # historique récupéré pour le backtest

# --- Optimisation (python -m screener.optimize) ---
optimize:
  metric: robust         # robust | expectancy | profit_factor
  min_trades: 30         # plancher : combos sous ce seuil disqualifiés
  split: 0.6             # fraction in-sample (reste = out-of-sample)
  # Grille balayée (modifiable). 3^6 = 729 combinaisons par défaut.
  grid:
    climax_vol: [1.8, 2.0, 2.5]
    sos_vol: [1.2, 1.3, 1.5]
    wide_spread_atr: [1.1, 1.3, 1.5]
    pen_atr: [0.05, 0.10, 0.20]
    rr: [1.5, 2.0, 3.0]
    stop_atr: [0.75, 1.0, 1.5]

# Liste manuelle (prioritaire sur `top` si non vide)
symbols: []
# symbols: [BTC/USDT, ETH/USDT, SOL/USDT]

# --- Détection de plage ---
lookback: 80            # barres utilisées pour définir la plage
buffer: 5               # dernières barres examinées pour les événements
vol_ma: 20
atr_period: 14

# --- Double creux / double sommet + divergence RSI (option --divergence) ---
divergence:
  rsi_period: 14         # période du RSI (doit matcher le RSI des features)
  min_rsi_div: 8.0       # écart RSI mini entre les deux pivots (points) — divergence franche
  double_tol_pct: 0.12   # proximité des deux pivots, en fraction de la hauteur de plage
  support_frac: 0.33     # "près de la borne" : fraction de hauteur depuis support/résistance
  recent_bars: 12        # le 2e pivot doit tomber dans les N dernières barres (formation)
  left: 2                # fractale : barres à gauche d'un pivot
  right: 2               # fractale : barres à droite (retard de confirmation)

# --- Seuils des détecteurs (heuristiques Wyckoff/VSA) ---
thresholds:
  climax_vol: 2.0        # vol_ratio d'un climax (SC/BC)
  sos_vol: 1.3           # vol_ratio d'un SOS/SOW
  wide_spread_atr: 1.3   # barre "large" (spread / ATR)
  narrow_spread_atr: 0.7
  test_vol: 0.85         # volume sec d'un test/ST
  pen_atr: 0.1           # pénétration mini hors borne (en ATR) pour spring/UTAD
  reclaim_clv: 0.5       # position de clôture dans la barre
